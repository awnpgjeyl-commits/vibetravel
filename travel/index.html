    <script>
        window.__ensureVibeTripReact = async function () {
            if (window.React && window.ReactDOM) return;

            const loadScript = (src) => new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            const reactCandidates = [
                'https://unpkg.com/react@18/umd/react.development.js',
                'https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js',
                'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js'
            ];
            const reactDomCandidates = [
                'https://unpkg.com/react-dom@18/umd/react-dom.development.js',
                'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js',
                'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js'
            ];

            let lastError;
            for (const src of reactCandidates) {
                if (window.React) break;
                try {
                    await loadScript(src);
                } catch (e) {
                    lastError = e;
                }
            }
            for (const src of reactDomCandidates) {
                if (window.ReactDOM) break;
                try {
                    await loadScript(src);
                } catch (e) {
                    lastError = e;
                }
            }

            if (!window.React || !window.ReactDOM) {
                throw lastError || new Error('React/ReactDOM 加载失败');
            }
        };

        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                    },
                },
            }
        };
    </script>

                            }, '结果加载失败'),
                            React.createElement('button', {
                                key: 'retry-btn',
                                onClick: handleRestart,
                                className: 'px-6 py-3 bg-primary hover:bg-primary/80 rounded-lg'
                            }, '重新测试')
                        ])
                    ]);
                }

                return React.createElement('div', {
                    className: 'min-h-screen bg-gradient-custom text-white'
                }, [
                    React.createElement('div', {
                        key: 'container',
                        className: 'container mx-auto px-4 py-16'
                    }, [
                        React.createElement('div', {
                            key: 'result-header',
                            className: 'text-center mb-12'
                        }, [
                            React.createElement('div', {
                                key: 'emoji',
                                className: 'text-6xl mb-4'
                            }, result.persona_emoji),
                            React.createElement('h1', {
                                key: 'title',
                                className: 'text-4xl font-bold mb-6'
                            }, result.persona_title),
                            React.createElement('p', {
                                key: 'analysis',
                                className: 'text-xl max-w-2xl mx-auto leading-relaxed'
                            }, result.analysis)
                        ]),
                        React.createElement('div', {
                            key: 'destinations',
                            className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-12'
                        }, result.destinations.map((destination, index) => 
                            React.createElement('div', {
                                key: index,
                                className: 'relative rounded-xl overflow-hidden h-80 hover:scale-105 transition-transform duration-300'
                            }, [
                                React.createElement('div', {
                                    key: 'overlay',
                                    className: 'absolute inset-0 bg-black/40 z-10'
                                }),
                                React.createElement('img', {
                                    key: 'image',
                                    src: destination.image_url,
                                    alt: destination.name,
                                    className: 'absolute inset-0 w-full h-full object-cover transition-transform duration-500 hover:scale-110',
                                    onError: (e) => {
                                        e.target.src = `https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80`;
                                    }
                                }),
                                React.createElement('div', {
                                    key: 'content',
                                    className: 'absolute inset-0 z-20 flex flex-col justify-end p-6'
                                }, [
                                    React.createElement('h3', {
                                        key: 'name',
                                        className: 'text-2xl font-bold mb-1'
                                    }, destination.name),
                                    React.createElement('p', {
                                        key: 'country',
                                        className: 'text-sm mb-3 opacity-90'
                                    }, destination.country),
                                    React.createElement('p', {
                                        key: 'reason',
                                        className: 'text-sm'
                                    }, destination.reason)
                                ])
                            ])
                        )),
                        React.createElement('div', {
                            key: 'buttons',
                            className: 'flex flex-col sm:flex-row justify-center gap-4'
                        }, [
                            React.createElement('button', {
                                key: 'restart',
                                onClick: handleRestart,
                                className: 'px-8 py-3 bg-primary hover:bg-primary/80 rounded-lg font-semibold transition-all duration-300'
                            }, '重新测试'),
                            React.createElement('button', {
                                key: 'itinerary',
                                onClick: handleGenerateItinerary,
                                className: 'px-8 py-3 bg-white text-blue-900 hover:bg-gray-100 rounded-lg font-semibold transition-all duration-300'
                            }, '生成详细行程')
                        ])
                    ])
                ]);
            }

            // 测试页面
            return React.createElement('div', {
                className: 'fixed inset-0 overflow-hidden'
            }, [
                React.createElement('div', {
                    key: 'background',
                    className: 'absolute inset-0 z-0'
                }, [
                    React.createElement('img', {
                        key: 'bg-image',
                        src: currentImageUrl,
                        alt: 'Background',
                        className: 'w-full h-full object-cover'
                    }),
                    React.createElement('div', {
                        key: 'bg-overlay',
                        className: 'absolute inset-0 bg-black/60'
                    })
                ]),
                React.createElement('div', {
                    key: 'content',
                    className: 'relative z-10 flex flex-col items-center justify-center min-h-screen px-4'
                }, [
                    React.createElement('div', {
                        key: 'container',
                        className: 'w-full max-w-4xl'
                    }, [
                        React.createElement('div', {
                            key: 'progress',
                            className: 'mb-4 text-center'
                        }, [
                            React.createElement('span', {
                                key: 'progress-text',
                                className: 'text-white/80 text-sm'
                            }, `问题 ${currentQuestionIndex + 1} / ${quizQuestions.length}`),
                            React.createElement('div', {
                                key: 'progress-bar',
                                className: 'w-full h-1 bg-white/20 rounded-full mt-2'
                            }, [
                                React.createElement('div', {
                                    key: 'progress-fill',
                                    className: 'h-full bg-primary rounded-full transition-all duration-500',
                                    style: {
                                        width: `${((currentQuestionIndex + 1) / quizQuestions.length) * 100}%`
                                    }
                                })
                            ])
                        ]),
                        React.createElement('div', {
                            key: 'question',
                            className: 'text-center mb-12'
                        }, [
                            React.createElement('h2', {
                                key: 'question-text',
                                className: 'text-3xl md:text-4xl font-bold text-white mb-8'
                            }, currentQuestion.question),
                            currentQuestion.type === 'text-input' ? 
                                React.createElement('div', {
                                    key: 'text-input-container',
                                    className: 'max-w-2xl mx-auto'
                                }, [
                                    React.createElement('input', {
                                        key: 'text-input',
                                        type: 'text',
                                        value: textInput,
                                        onChange: (e) => setTextInput(e.target.value),
                                        placeholder: currentQuestion.placeholder || '请输入...',
                                        className: 'w-full px-6 py-4 rounded-xl bg-white/10 border-2 border-white/20 text-white text-lg placeholder-white/50 focus:outline-none focus:border-primary transition-all duration-300',
                                        onKeyPress: (e) => {
                                            if (e.key === 'Enter') {
                                                handleTextInputSubmit();
                                            }
                                        }
                                    }),
                                    React.createElement('div', {
                                        key: 'navigation-buttons',
                                        className: 'flex justify-between items-center mt-6'
                                    }, [
                                        React.createElement('button', {
                                            key: 'previous-button',
                                            onClick: handlePreviousQuestion,
                                            disabled: currentQuestionIndex === 0,
                                            className: `px-6 py-3 rounded-lg font-semibold transition-all duration-300 ${currentQuestionIndex === 0 ? 'bg-white/20 text-white/50 cursor-not-allowed' : 'bg-white/20 text-white hover:bg-white/30'}`
                                        }, '上一题'),
                                        React.createElement('button', {
                                            key: 'submit-button',
                                            onClick: handleTextInputSubmit,
                                            className: 'px-8 py-3 bg-primary hover:bg-primary/80 text-white text-lg font-semibold rounded-lg transition-all duration-300 shadow-lg hover:shadow-xl'
                                        }, '确认')
                                    ])
                                ]) :
                                React.createElement('div', {
                                    key: 'options-container',
                                    className: 'space-y-6'
                                }, [
                                    React.createElement('div', {
                                        key: 'options',
                                        className: 'grid grid-cols-1 md:grid-cols-2 gap-6'
                                    }, currentQuestion.options.map((option) => {
                                        const isSelected = selectedOptions.some(opt => opt.id === option.id);
                                        return React.createElement('button', {
                                            key: option.id,
                                            onClick: () => handleOptionSelect(option),
                                            className: `glass-effect rounded-xl p-6 text-left transition-all duration-300 hover:bg-white/15 hover:shadow-lg ${isSelected ? 'ring-2 ring-primary bg-white/20' : ''}`
                                        }, [
                                            React.createElement('p', {
                                                key: 'option-text',
                                                className: 'text-white text-lg font-medium'
                                            }, option.text)
                                        ]);
                                    })),
                                    currentQuestion.multiSelect ? 
                                        React.createElement('div', {
                                            key: 'navigation-buttons',
                                            className: 'flex justify-between items-center mt-8'
                                        }, [
                                            React.createElement('button', {
                                                key: 'previous-button',
                                                onClick: handlePreviousQuestion,
                                                disabled: currentQuestionIndex === 0,
                                                className: `px-6 py-3 rounded-lg font-semibold transition-all duration-300 ${currentQuestionIndex === 0 ? 'bg-white/20 text-white/50 cursor-not-allowed' : 'bg-white/20 text-white hover:bg-white/30'}`
                                            }, '上一题'),
                                            React.createElement('div', {
                                                key: 'selection-info',
                                                className: 'text-white/80 text-sm'
                                            }, `已选择 ${selectedOptions.length} 个选项`),
                                            React.createElement('button', {
                                                key: 'next-button',
                                                onClick: handleNextQuestion,
                                                disabled: selectedOptions.length === 0,
                                                className: `px-6 py-3 rounded-lg font-semibold transition-all duration-300 ${selectedOptions.length === 0 ? 'bg-primary/50 text-white/50 cursor-not-allowed' : 'bg-primary text-white hover:bg-primary/80'}`
                                            }, currentQuestionIndex === quizQuestions.length - 1 ? '完成' : '下一题')
                                        ]) :
                                        React.createElement('div', {
                                            key: 'navigation-buttons',
                                            className: 'flex justify-between items-center mt-8'
                                        }, [
                                            React.createElement('button', {
                                                key: 'previous-button',
                                                onClick: handlePreviousQuestion,
                                                disabled: currentQuestionIndex === 0,
                                                className: `px-6 py-3 rounded-lg font-semibold transition-all duration-300 ${currentQuestionIndex === 0 ? 'bg-white/20 text-white/50 cursor-not-allowed' : 'bg-white/20 text-white hover:bg-white/30'}`
                                            }, '上一题'),
                                            React.createElement('div', {
                                                key: 'spacer',
                                                className: 'flex-1'
                                            })
                                        ])
                                ])
                        ])
                    ])
                ])
            ]);
        };

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (typeof window.__ensureVibeTripReact === 'function') {
                    await window.__ensureVibeTripReact();
                }
            } catch (e) {
            }

            if (!window.React || !window.ReactDOM) {
                const root = document.getElementById('app');
                if (root) {
                    root.innerHTML = '<div style="padding:24px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#111;line-height:1.6"><div style="font-size:18px;font-weight:700;margin-bottom:8px">页面依赖加载失败</div><div style="margin-bottom:8px">当前无法加载 React 依赖（常见原因：网络受限/被拦截）。</div><div>建议：1）切换网络或关闭拦截；2）用本地服务器打开（不要直接双击 HTML）；3）如需离线可用，我可以把页面改成纯原生 JS 版本。</div></div>';
                }
                return;
            }

            try {
                ReactDOM.render(
                    React.createElement(App),
                    document.getElementById('app')
                );
            } catch (e) {
                const root = document.getElementById('app');
                if (root) {
                    const message = e && e.message ? String(e.message) : '未知错误';
                    root.innerHTML = `<div style="padding:24px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#111;line-height:1.6"><div style="font-size:18px;font-weight:700;margin-bottom:8px">页面脚本运行出错</div><div style="margin-bottom:8px">${message}</div><div>建议：按 F12 打开控制台查看详细报错位置，然后把报错内容发我，我可以继续精确修复。</div></div>`;
                }
            }
        });
    </script>
</body>
</html>
